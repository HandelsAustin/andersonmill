    .app-header {

      padding: 10px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }
    .header-left h1 { font-family: 'Playfair Display', serif; font-size: 26px; color: #f5f0e8; letter-spacing: 0.02em; }
    .header-left h1 span { color: #c8102e; }
    .header-sub { font-size: 11px; color: #8fa3be; letter-spacing: 0.08em; text-transform: uppercase; margin-top: 3px; }
    .header-logo { height: 52px; width: auto; flex-shrink: 0; display: block; }

    .app-body { padding: 16px 24px; }

    /* Toolbar */
    .toolbar { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; margin-bottom: 14px; }
    .btn {
      font-family: 'Open Sans', sans-serif; font-size: 12px; font-weight: 600;
      padding: 7px 13px; border-radius: 6px; border: 1.5px solid #2e4a70;
      background: #1e3558; color: #c5d8f0; cursor: pointer;
      display: inline-flex; align-items: center; gap: 5px;
      letter-spacing: 0.02em; transition: all 0.15s; text-decoration: none;
    }
    .btn:hover { background: #26436a; border-color: #4a7ab5; color: #e8f0fb; }
    .btn-red { background: #7a0f1f; border-color: #a01525; color: #f5d0d5; }
    .btn-red:hover { background: #921222; border-color: #c8102e; color: #ffe0e5; }
    .btn-green { background: #0f4a2a; border-color: #1a7040; color: #b0f0ce; }
    .btn-green:hover { background: #165e35; border-color: #22a05a; color: #c8ffd8; }
    .btn label { cursor: pointer; display: flex; align-items: center; gap: 5px; }
    .btn input[type=file] { display: none; }

    /* Legend */
    .legend { display: flex; gap: 18px; flex-wrap: wrap; margin-bottom: 12px; padding: 8px 14px; background: #12223a; border-radius: 6px; border: 1px solid #2e4a70; }
    .legend-item { display: flex; align-items: center; gap: 7px; font-size: 11px; color: #8fa3be; }
    .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

    /* Run banner */
    .run-banner { display: flex; align-items: center; justify-content: space-between; background: #0f3a1f; border: 1.5px solid #1a7040; border-radius: 6px; padding: 9px 14px; margin-bottom: 12px; font-size: 13px; color: #b0f0ce; gap: 10px; flex-wrap: wrap; }
    .run-banner .btn { background: #12223a; border-color: #1a7040; color: #b0f0ce; font-size: 11px; padding: 4px 10px; }
    .run-banner .btn:hover { background: #1a3a28; }

    /* Main table */
    table { width: 100%; border-collapse: collapse; font-size: 13px; table-layout: fixed; }
    col.col-flavor  { width: auto; }
    col.col-type    { width: 60px; }
    col.col-target  { width: 68px; }
    col.col-dipping { width: 124px; }
    col.col-holding { width: 76px; }
    col.col-tomake  { width: 72px; }
    col.col-action  { width: 36px; }
    thead tr { background: #12223a; }
    thead th { font-size: 11px; font-weight: 600; color: #8fa3be; text-align: left; padding: 8px; border-bottom: 2px solid #c8102e; white-space: nowrap; letter-spacing: 0.06em; text-transform: uppercase; user-select: none; }
    tbody tr { border-left: 3px solid transparent; transition: background 0.1s; }
    tbody tr:nth-child(even) { background: rgba(255,255,255,0.03); }
    tbody tr:hover { background: rgba(100,160,255,0.08); }
    tbody td { padding: 5px 8px; border-bottom: 1px solid #1e3558; vertical-align: middle; }

    /* Flavor type colors */
    .flavor-regular { color: #6ab0ff; font-weight: 500; }
    .flavor-wo      { color: #a8d8f0; font-weight: 500; }
    .flavor-td      { color: #ff7a7a; font-weight: 500; }

    /* Type badge */

    td select { font-family: 'Open Sans', sans-serif; font-size: 12px; padding: 4px 5px; border: 1px solid #2e4a70; border-radius: 4px; background: #12223a; color: #c5d8f0; cursor: pointer; width: 100%; }
    td select:focus { outline: none; border-color: #4a7ab5; }
    td input[type=number] { font-family: 'Open Sans', sans-serif; font-size: 12px; padding: 4px; border: 1px solid #2e4a70; border-radius: 4px; background: #12223a; color: #c5d8f0; width: 100%; text-align: center; }
    td input[type=number]:focus { outline: none; border-color: #4a7ab5; }
    .to-make { font-size: 1.05em; font-weight: 700; text-align: center; }
    .to-make-needed { color: #ff6b6b; }
    .to-make-ok     { color: #3a5a80; }
    .btn-icon { background: transparent; border: none; padding: 4px; cursor: pointer; color: #3a5a80; font-size: 15px; transition: color 0.15s; }
    .btn-icon:hover { color: #c8102e; }
    .empty-state { text-align: center; padding: 2.5rem 1rem; color: #3a5a80; font-size: 13px; }

    /* Modal */
    .modal-backdrop { display: none; position: fixed; inset: 0; background: rgba(10,18,35,0.88); z-index: 100; align-items: flex-start; justify-content: center; padding-top: 40px; }
    .modal-backdrop.open { display: flex; }
    .modal { background: #1a2f52; border-radius: 10px; border: 1.5px solid #2e4a70; width: 500px; max-width: calc(100vw - 24px); padding: 20px; box-shadow: 0 8px 40px rgba(0,0,0,0.6); max-height: calc(100vh - 60px); display: flex; flex-direction: column; overflow: hidden; }
    .modal h2 { font-family: 'Playfair Display', serif; font-size: 18px; color: #f5f0e8; margin-bottom: 10px; border-bottom: 2px solid #c8102e; padding-bottom: 8px; flex-shrink: 0; }
    .modal-footer { display: flex; justify-content: flex-end; gap: 8px; margin-top: 12px; flex-shrink: 0; }

    .section-label { font-size: 10px; font-weight: 700; color: #4a6a90; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px; flex-shrink: 0; }
    .search-wrap { margin-bottom: 6px; flex-shrink: 0; }

    .picker-stats { font-size: 11px; color: #4a6a90; margin-bottom: 6px; flex-shrink: 0; }

      <button class="btn" onclick="saveSessionTSV()">&#8681; Save Session</button>
      <button class="btn btn-red" onclick="resetDay()">&#8635; Reset</button>
      <button class="btn btn-green" onclick="calculateRun()">&#9998; Calculate Run</button>
    </div>

    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:#6ab0ff"></div> Regular</div>
      <div class="legend-item"><div class="legend-dot" style="background:#a8d8f0"></div> Washout (WO)</div>
      <div class="legend-item"><div class="legend-dot" style="background:#ff7a7a"></div> Tear Down (TD)</div>
    </div>

    <div id="runBanner" style="display:none" class="run-banner">
      <span id="runBannerMsg"></span>
      <button class="btn" onclick="clearRunView()">&#10005; Show All</button>
    </div>

    <table>
      <colgroup>
        <col class="col-flavor">
        <col class="col-type">
        <col class="col-target">
        <col class="col-dipping">
        <col class="col-holding">
        <col class="col-tomake">
        <col class="col-action">
      </colgroup>
      <thead>

          <th>Type</th>
          <th style="text-align:center">Target</th>
          <th>In Dipping</th>
          <th style="text-align:center">Holding</th>
          <th style="text-align:center">To Make</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="mainTbody"></tbody>
    </table>
  </div>
</div>

<!-- Modal -->
<div id="modalBackdrop" class="modal-backdrop" onclick="backdropClick(event)">
  <div class="modal">
    <h2>Edit Today's Flavors</h2>
    <p class="section-label">Click a flavor to add/remove from today's list &middot; &#128465; removes from roster</p>
    <div class="search-wrap">
      <input type="text" id="pickerSearch" placeholder="Search flavors&hellip;" oninput="renderPicker()">
    </div>
    <div id="pickerStats" class="picker-stats"></div>
    <div class="picker-list" id="pickerList"></div>
    <div class="divider"></div>
    <p class="section-label">Add a custom flavor to roster</p>
    <div class="new-flavor-row">
      <input type="text" id="newFlavorName" placeholder="Flavor name&hellip;">
      <select id="newFlavorType">
        <option value="">Regular</option>
        <option value="WO">WO</option>
        <option value="TD">TD</option>
      </select>
      <button class="btn" onclick="addNewToRoster()">+ Add</button>
    </div>
    <div class="modal-footer">
      <button class="btn btn-primary" onclick="closeModal()">Done</button>
    </div>
  </div>
</div>

// ── STATE ──────────────────────────────────────────────────────────────────
let roster = [];        // full list (MASTER_ROSTER + any user-added)
let activeFlavors = []; // flavors on today's list
let runMode = false;

// ── CATEGORY SORT ──────────────────────────────────────────────────────────
// Converts a category string to a numeric-sortable value.
// Pure-numeric categories sort numerically; alphanumeric sort lexically after.
function categorySort(cat) {
  const s = String(cat || '');
  const n = Number(s);
  if (!isNaN(n) && s.trim() !== '') return n;
  // prefix letters → push after numerics by adding a large base
  return 1e9 + s.charCodeAt(0) * 1e6 + (parseInt(s.replace(/\D/g,'')) || 0);
}

// ── PERSISTENCE ────────────────────────────────────────────────────────────

  // Only save additions/removals from the master roster and active list
  const customAdded = roster.filter(r => !MASTER_ROSTER.find(m => m.name === r.name));
  const removedNames = MASTER_ROSTER.filter(m => !roster.find(r => r.name === m.name)).map(m => m.name);
  localStorage.setItem('car_custom', JSON.stringify(customAdded));
  localStorage.setItem('car_removed', JSON.stringify(removedNames));
  localStorage.setItem('car_active', JSON.stringify(activeFlavors));
}

function loadAll() {
  // Rebuild roster from master + user additions - user removals
  let removed = [];
  let custom = [];
  try { removed = JSON.parse(localStorage.getItem('car_removed') || '[]'); } catch(e) {}
  try { custom = JSON.parse(localStorage.getItem('car_custom') || '[]'); } catch(e) {}
  roster = [
    ...MASTER_ROSTER.filter(m => !removed.includes(m.name)),
    ...custom
  ];
  try { activeFlavors = JSON.parse(localStorage.getItem('car_active') || '[]'); } catch(e) { activeFlavors = []; }
  // Sync type/category from roster in case roster changed
  activeFlavors = activeFlavors.map(f => {
    const r = roster.find(x => x.name === f.name);
    return r ? { ...f, category: r.category, type: r.type } : f;
  }).filter(f => roster.find(x => x.name === f.name));
}

// ── HELPERS ────────────────────────────────────────────────────────────────
function toMake(f) {
  return Math.max(0, (parseInt(f.target) || 0) - Math.round((Number(f.dipping) || 0) - 0.1) - (parseInt(f.holding) || 0));
}

function typeColor(type) {
  if (type === 'TD') return '#ff7a7a';
  if (type === 'WO') return '#a8d8f0';
  return '#6ab0ff';
}

function flavorClass(f) {
  const t = (f.type || '').toUpperCase();
  if (t === 'WO') return 'flavor-wo';
  if (t === 'TD') return 'flavor-td';
  return 'flavor-regular';
}

// Sort: alphabetical normally; by category number in run mode
function getSorted(list) {
  return [...list].sort((a, b) => {
    if (runMode) return categorySort(a.category) - categorySort(b.category);
    return (a.name || '').toLowerCase().localeCompare((b.name || '').toLowerCase());
  });
}

// ── DROPDOWNS ──────────────────────────────────────────────────────────────
const DIPPING_OPTIONS = [
  {label:'—', value:0},
  {label:'¼ bucket', value:0.25},
  {label:'½ bucket', value:0.5},
  {label:'¾ bucket', value:0.75},
  {label:'Full bucket', value:1},
];
const HOLDING_OPTIONS = [
  {label:'—',value:0},{label:'1',value:1},{label:'2',value:2},{label:'3',value:3},
  {label:'4',value:4},{label:'5',value:5},{label:'6',value:6},
];

function makeSelect(options, currentVal, fn) {
  const sel = document.createElement('select');
  options.forEach(opt => {
    const o = document.createElement('option');
    o.value = opt.value;
    o.textContent = opt.label;
    if (Number(currentVal) === opt.value) o.selected = true;
    sel.appendChild(o);
  });
  sel.onchange = e => fn(Number(e.target.value));
  return sel;
}

// ── TABLE ──────────────────────────────────────────────────────────────────
function buildRow(f) {
  const idx = activeFlavors.findIndex(x => x.name === f.name);
  const tr = document.createElement('tr');
  const tm = toMake(f);
  const color = typeColor(f.type);

  // Flavor name — colored by type, no category shown
  const tdName = document.createElement('td');
  tdName.style.cssText = 'font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;';
  const sp = document.createElement('span');
  sp.className = flavorClass(f);
  sp.textContent = f.name;
  tdName.appendChild(sp);
  tr.appendChild(tdName);

  // Type badge — colored by type
  const tdType = document.createElement('td');
  const badge = document.createElement('span');
  badge.className = 'type-badge';
  badge.style.color = color;
  badge.textContent = f.type || '—';
  tdType.appendChild(badge);
  tr.appendChild(tdType);

  // Target
  const tdTarget = document.createElement('td');
  const inp = document.createElement('input');
  inp.type = 'number'; inp.min = 0; inp.value = f.target;
  inp.onchange = e => { activeFlavors[idx].target = parseInt(e.target.value) || 0; saveAll(); renderTable(); };
  tdTarget.appendChild(inp);
  tr.appendChild(tdTarget);

  // In Dipping
  const tdDip = document.createElement('td');
  tdDip.appendChild(makeSelect(DIPPING_OPTIONS, f.dipping, val => { activeFlavors[idx].dipping = val; saveAll(); renderTable(); }));
  tr.appendChild(tdDip);

  // Holding
  const tdHold = document.createElement('td');
  tdHold.appendChild(makeSelect(HOLDING_OPTIONS, f.holding, val => { activeFlavors[idx].holding = val; saveAll(); renderTable(); }));
  tr.appendChild(tdHold);

  // To Make
  const tdTM = document.createElement('td');
  tdTM.className = 'to-make ' + (tm > 0 ? 'to-make-needed' : 'to-make-ok');
  tdTM.textContent = tm;
  tr.appendChild(tdTM);

  // Remove from today
  const tdAct = document.createElement('td');
  const btn = document.createElement('button');
  btn.className = 'btn-icon'; btn.textContent = '🗑'; btn.title = 'Remove from today\'s list';
  btn.onclick = () => removeFromActive(activeFlavors.findIndex(x => x.name === f.name));
  tdAct.appendChild(btn);
  tr.appendChild(tdAct);

  return tr;
}

function renderTable() {
  const tbody = document.getElementById('mainTbody');
  tbody.innerHTML = '';
  const list = runMode ? activeFlavors.filter(f => toMake(f) > 0) : activeFlavors;
  const sorted = getSorted(list);
  if (!sorted.length) {
    tbody.innerHTML = `<tr><td colspan="7" class="empty-state">${
      runMode
        ? '🎉 Nothing to make — all flavors are fully stocked!'
        : 'No flavors on today\'s list. Click "Edit Flavors" to get started.'
    }</td></tr>`;
    return;
  }
  sorted.forEach(f => tbody.appendChild(buildRow(f)));
}

function removeFromActive(idx) {
  if (idx < 0) return;
  activeFlavors.splice(idx, 1);
  saveAll(); renderTable();
}

// ── RUN MODE ───────────────────────────────────────────────────────────────
function calculateRun() {
  runMode = true;
  const needed = activeFlavors.filter(f => toMake(f) > 0);
  const total = needed.reduce((s, f) => s + toMake(f), 0);
  document.getElementById('runBannerMsg').textContent =
    `${needed.length} flavor${needed.length !== 1 ? 's' : ''} to make — ${total} bucket${total !== 1 ? 's' : ''} total. Sorted by category order.`;
  document.getElementById('runBanner').style.display = 'flex';
  renderTable();
}

function clearRunView() {
  runMode = false;
  document.getElementById('runBanner').style.display = 'none';
  renderTable();
}

function resetDay() {
  if (!confirm('Reset for today?\n\nThis will clear all Dipping and Holding counts and return to A–Z sort.')) return;
  activeFlavors.forEach(f => { f.dipping = 0; f.holding = 0; });
  runMode = false;
  document.getElementById('runBanner').style.display = 'none';
  saveAll(); renderTable();
}

// ── MODAL / PICKER ─────────────────────────────────────────────────────────
function openAddModal() {
  document.getElementById('pickerSearch').value = '';
  document.getElementById('newFlavorName').value = '';
  document.getElementById('newFlavorType').value = '';
  document.getElementById('modalBackdrop').classList.add('open');
  renderPicker();
  setTimeout(() => document.getElementById('pickerSearch').focus(), 60);
}

function closeModal() {
  document.getElementById('modalBackdrop').classList.remove('open');
  renderTable();
}

function backdropClick(e) {
  if (e.target === document.getElementById('modalBackdrop')) closeModal();
}

function toggleFlavor(name) {
  const idx = activeFlavors.findIndex(f => f.name === name);
  if (idx >= 0) {
    activeFlavors.splice(idx, 1);
  } else {
    const r = roster.find(r => r.name === name);
    activeFlavors.push({ name, category: r ? r.category : '', type: r ? r.type || '' : '', target: 0, dipping: 0, holding: 0 });
  }
  saveAll(); renderPicker();
}

function removeFromRoster(name) {
  if (!confirm(`Remove "${name}" from the roster permanently?`)) return;
  roster = roster.filter(r => r.name !== name);
  activeFlavors = activeFlavors.filter(f => f.name !== name);
  saveAll(); renderPicker();
}

function renderPicker() {
  const q = document.getElementById('pickerSearch').value.toLowerCase();
  const activeNames = new Set(activeFlavors.map(f => f.name));
  const items = roster
    .filter(r => r.name.toLowerCase().includes(q))
    .sort((a, b) => {
      const aOn = activeNames.has(a.name), bOn = activeNames.has(b.name);
      if (aOn && !bOn) return -1;
      if (!aOn && bOn) return 1;
      return a.name.toLowerCase().localeCompare(b.name.toLowerCase());
    });

  document.getElementById('pickerStats').textContent =
    `${activeFlavors.length} on today's list · ${roster.length} in roster`;

  const list = document.getElementById('pickerList');
  list.innerHTML = '';

  if (!items.length) {
    const e = document.createElement('div');
    e.className = 'picker-empty';
    e.style.cssText = 'padding:1rem;font-size:12px;color:#4a6a90;text-align:center;';
    e.textContent = q ? 'No matches found' : 'Roster is empty';
    list.appendChild(e);
    return;
  }

  items.forEach(r => {
    const isActive = activeNames.has(r.name);
    const color = typeColor(r.type);

    const div = document.createElement('div');
    div.className = 'picker-item' + (isActive ? ' active' : '');

    // Checkmark
    const check = document.createElement('span');
    check.className = 'picker-check';
    check.textContent = isActive ? '✓' : '';
    div.appendChild(check);

    // Name — colored by type, no category shown
    const nameSpan = document.createElement('span');
    nameSpan.className = 'picker-name';
    nameSpan.style.color = color;
    nameSpan.textContent = r.name;
    nameSpan.addEventListener('click', () => toggleFlavor(r.name));
    div.appendChild(nameSpan);

    // Type badge — colored by type
    const typeBadge = document.createElement('span');
    typeBadge.className = 'picker-type-badge';
    typeBadge.style.color = color;
    typeBadge.textContent = r.type || '—';
    div.appendChild(typeBadge);

    // Remove from roster
    const removeBtn = document.createElement('button');
    removeBtn.className = 'picker-remove';
    removeBtn.textContent = '🗑';
    removeBtn.title = 'Remove from roster';
    removeBtn.addEventListener('click', e => { e.stopPropagation(); removeFromRoster(r.name); });
    div.appendChild(removeBtn);

    list.appendChild(div);
  });
}

function addNewToRoster() {
  const name = document.getElementById('newFlavorName').value.trim();
  const type = document.getElementById('newFlavorType').value;
  if (!name) { document.getElementById('newFlavorName').focus(); return; }
  if (roster.find(r => r.name.toLowerCase() === name.toLowerCase())) {
    alert(`"${name}" is already in the roster.`); return;
  }
  // Custom flavors get a high category number so they sort to the end in run mode
  roster.push({ name, category: '99999', type });
  saveAll(); renderPicker();
}

// ── SESSION SAVE / LOAD ────────────────────────────────────────────────────
function saveSessionTSV() {
  const headers = ['Flavor', 'Category', 'Type', 'Target', 'In Dipping', 'In Holding', 'To Make'];
  const lines = activeFlavors.map(f =>
    [f.name, f.category, f.type, f.target, f.dipping, f.holding, toMake(f)].join('\t')
  );
  const tsv = [headers.join('\t'), ...lines].join('\n');
  const today = new Date();
  const d = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([tsv], {type:'text/tab-separated-values'}));
  a.download = `count_and_run-${d}.txt`;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
}

function loadSessionTSV(event) {
  const file = event.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const lines = e.target.result.trim().split(/\r?\n/);
    if (lines.length < 2) { alert('File has no data rows.'); return; }
    activeFlavors = [];
    for (let i = 1; i < lines.length; i++) {
      const c = lines[i].split('\t'); if (!c[0]) continue;
      const rEntry = roster.find(r => r.name.toLowerCase() === c[0].toLowerCase());
      const flavor = {
        name: c[0],
        category: rEntry ? rEntry.category : (c[1] || '99999'),
        type: rEntry ? rEntry.type || '' : (c[2] || ''),
        target: parseInt(c[3]) || 0,
        dipping: Number(c[4]) || 0,
        holding: parseInt(c[5]) || 0,
      };
      activeFlavors.push(flavor);
      if (!rEntry) roster.push({ name: c[0], category: flavor.category, type: flavor.type });
    }
    saveAll(); renderTable();
  };
  reader.readAsText(file);
}

// ── INIT ───────────────────────────────────────────────────────────────────
loadAll();
renderTable();
</script>
